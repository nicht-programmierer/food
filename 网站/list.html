<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食列表 - 深圳小众烟火美食打卡</title>
    <meta name="description" content="浏览深圳福田、南山、宝安、龙华等区域的小众美食店铺，发现你的下一顿好味道。">
    <!-- 引入公用 CSS 样式 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 列表页专属样式 -->
    <style>
        /* ===== 列表网格布局 ===== */
        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-lg);
        }

        /* ===== 搜索结果计数 ===== */
        .list-count {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-lg);
        }

        .list-count span {
            color: var(--color-primary);
            font-weight: 700;
        }

        /* ===== 加载更多提示 ===== */
        .list-footer {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* ===== 点卡片悬停交互 ===== */
        .shop-card {
            display: flex;
            flex-direction: column;
            animation: cardSlideUp 0.5s ease backwards;
        }

        .shop-card-img-link {
            display: block;
            overflow: hidden;
        }

        .shop-card-img-link .food-img-placeholder {
            transition: transform 0.4s ease;
        }

        .shop-card:hover .food-img-placeholder {
            transform: scale(1.05);
        }

        .shop-card-body {
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex: 1;
        }

        .shop-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-card-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: color var(--transition-fast);
        }

        .shop-card-name:hover {
            color: var(--color-primary);
        }

        .shop-card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 0.85rem;
        }

        .shop-card-price {
            color: var(--color-secondary);
            font-weight: 600;
        }

        .shop-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .shop-card-intro {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: auto;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .list-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: var(--spacing-md);
            }
        }

        @media (max-width: 480px) {
            .list-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航栏 ==================== -->
    <nav class="navbar">
        <div class="navbar-inner">
            <!-- Logo -->
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🔥</span>
                <span>深圳烟火美食</span>
            </a>

            <!-- 移动端菜单按钮 -->
            <button class="nav-toggle" aria-label="菜单">☰</button>

            <!-- 导航链接 -->
            <div class="nav-links">
                <a href="index.html">🏠 首页</a>
                <a href="list.html" class="active">📋 美食列表</a>
                <a href="mine.html">💝 我的打卡</a>
                <a href="about.html">ℹ️ 关于本站</a>
            </div>
        </div>
    </nav>

    <!-- ==================== 页面主体 ==================== -->
    <main class="page-container">

        <!-- ========== 页面标题 ========== -->
        <div class="page-header">
            <h1>🍜 深圳小众烟火美食</h1>
            <p class="subtitle">按区域筛选，找到离你最近的宝藏小店</p>
        </div>

        <!-- ========== 区域筛选按钮组（JS 动态生成） ========== -->
        <div class="filter-group" id="filterGroup">
            <!-- 由 renderFilterButtons() 动态生成 -->
        </div>

        <!-- ========== 搜索结果计数 ========== -->
        <p class="list-count" id="listCount">
            共 <span id="countNum">0</span> 家店铺
        </p>

        <!-- ========== 店铺列表网格 ========== -->
        <div class="list-grid" id="listGrid">
            <!-- 由 JS 动态渲染店铺卡片 -->
        </div>

        <!-- ========== 列表底部提示 ========== -->
        <div class="list-footer">
            <p>🍲 更多宝藏小店持续收录中...</p>
        </div>

    </main>

    <!-- ==================== 页脚 ==================== -->
    <footer class="site-footer">
        <p>
            <span class="footer-icon">🔥</span>
            深圳小众烟火美食打卡 &copy; 2026
            &nbsp;|&nbsp; 用心记录每一份街头好味道
            <span class="footer-icon">🍜</span>
        </p>
    </footer>

    <!-- ==================== 引入公用 JS ==================== -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>

    <!-- ==================== 列表页专属脚本 ==================== -->
    <script>
        /* ============================================================
           列表页专属逻辑：区域筛选 + 店铺卡片渲染
           ============================================================ */

        /**
         * 根据当前筛选条件渲染店铺列表
         * @param {string} district - 区域名称（'全部' 表示不过滤）
         */
        function renderShopList(district = '全部') {
            const grid = document.getElementById('listGrid');
            const countSpan = document.getElementById('countNum');

            // 根据区域筛选数据
            const filteredShops = filterShopsByDistrict(district);

            // 更新计数
            countSpan.textContent = filteredShops.length;

            // 渲染卡片
            if (filteredShops.length === 0) {
                // 空状态：没有匹配的店铺
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <span class="empty-icon">🔍</span>
                        <p>该区域暂无收录店铺，快去<a href="about.html" style="color: var(--color-primary);">投稿</a>推荐吧！</p>
                    </div>
                `;
            } else {
                // 为每个店铺生成卡片 HTML
                grid.innerHTML = filteredShops.map(shop =>
                    createShopCardHTML(shop)
                ).join('');
            }
        }

        /**
         * 处理筛选变化
         * @param {string} district - 选中的区域
         */
        function handleFilterChange(district) {
            renderShopList(district);
        }

        /* ========== 页面初始化 ========== */
        function initListPage() {
            // 渲染筛选按钮组，并绑定回调
            renderFilterButtons('#filterGroup', handleFilterChange);
            // 默认显示全部店铺
            renderShopList('全部');
        }

        // 启动列表页
        initListPage();
    </script>

</body>
</html>
