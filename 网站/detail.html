<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店铺详情 - 深圳小众烟火美食打卡</title>
    <meta name="description" content="查看深圳小众美食店铺的详细信息，包括招牌菜品、营业时间、精确地址和探店避坑小贴士。">
    <!-- 引入公用 CSS 样式 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 详情页专属样式 -->
    <style>
        /* ===== 详情页布局 ===== */
        .detail-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== 返回链接 ===== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-lg);
            transition: color var(--transition-fast);
        }

        .back-link:hover {
            color: var(--color-primary);
        }

        /* ===== 多图展示区 ===== */
        .detail-gallery {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 200px 200px;
            gap: 8px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
        }

        .detail-gallery .gallery-main {
            grid-row: 1 / 3;
        }

        .detail-gallery .gallery-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            min-height: 100%;
        }

        .detail-gallery .gallery-main .gallery-item {
            font-size: 4rem;
        }

        /* ===== 店铺信息卡片 ===== */
        .detail-info-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-lg);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }

        .detail-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .detail-emoji {
            font-size: 2.5rem;
        }

        .detail-price-badge {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            font-size: 0.95rem;
        }

        .detail-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }

        .detail-meta-item strong {
            color: var(--text-primary);
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: var(--spacing-md);
        }

        .detail-intro {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        /* ===== 信息区块 ===== */
        .info-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-lg);
            animation: cardSlideUp 0.5s ease backwards;
        }

        .info-section:nth-child(3) { animation-delay: 0.1s; }
        .info-section:nth-child(4) { animation-delay: 0.2s; }
        .info-section:nth-child(5) { animation-delay: 0.3s; }

        .info-section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding-bottom: var(--spacing-sm);
            border-bottom: 2px solid var(--bg-warm);
        }

        /* 招牌菜品列表 */
        .signature-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .signature-item {
            background: var(--bg-warm);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 小贴士列表 */
        .tips-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .tips-item {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-sm);
            padding: 10px 14px;
            background: #FFF8E1;
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--color-accent);
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .tips-item .tips-icon {
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        /* 操作按钮区 */
        .detail-actions {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-xl);
        }

        .detail-actions .btn {
            flex: 1;
            min-width: 140px;
        }

        /* 收藏分组弹窗 */
        .fav-group-selector {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .fav-group-option {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .fav-group-option:hover {
            border-color: var(--color-primary);
            background: var(--bg-warm);
        }

        .fav-group-option .group-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 4px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .detail-gallery {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 180px 180px;
            }

            .detail-gallery .gallery-main {
                grid-column: 1 / 3;
                grid-row: 1 / 2;
            }

            .detail-name {
                font-size: 1.5rem;
            }

            .detail-header {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .detail-gallery {
                grid-template-columns: 1fr;
                grid-template-rows: 200px 120px 120px;
            }

            .detail-gallery .gallery-main {
                grid-column: 1;
                grid-row: 1;
            }

            .detail-actions {
                flex-direction: column;
            }

            .detail-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航栏 ==================== -->
    <nav class="navbar">
        <div class="navbar-inner">
            <!-- Logo -->
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🔥</span>
                <span>深圳烟火美食</span>
            </a>

            <!-- 移动端菜单按钮 -->
            <button class="nav-toggle" aria-label="菜单">☰</button>

            <!-- 导航链接 -->
            <div class="nav-links">
                <a href="index.html">🏠 首页</a>
                <a href="list.html">📋 美食列表</a>
                <a href="mine.html">💝 我的打卡</a>
                <a href="about.html">ℹ️ 关于本站</a>
            </div>
        </div>
    </nav>

    <!-- ==================== 页面主体 ==================== -->
    <main class="page-container">
        <div class="detail-container">

            <!-- 返回链接 -->
            <a href="javascript:history.back()" class="back-link">← 返回上一页</a>

            <!-- 店铺详情内容由 JS 动态生成 -->
            <div id="detailContent">
                <!-- 加载中的占位 -->
                <div class="empty-state">
                    <span class="empty-icon">🍜</span>
                    <p>正在加载店铺信息...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- ==================== 页脚 ==================== -->
    <footer class="site-footer">
        <p>
            <span class="footer-icon">🔥</span>
            深圳小众烟火美食打卡 &copy; 2026
            &nbsp;|&nbsp; 用心记录每一份街头好味道
            <span class="footer-icon">🍜</span>
        </p>
    </footer>

    <!-- ==================== 引入公用 JS ==================== -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>

    <!-- ==================== 详情页专属脚本 ==================== -->
    <script>
        /* ============================================================
           详情页专属逻辑：URL参数解析 + 店铺详情渲染 + 收藏操作
           ============================================================ */

        /**
         * 从 URL 查询参数中获取店铺 ID
         * 例如：detail.html?id=3 → 返回 3
         * @returns {number|null} 店铺ID 或 null
         */
        function getShopIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            return id ? parseInt(id) : null;
        }

        /**
         * 渲染店铺详情页完整内容
         * @param {Object} shop - 店铺数据对象
         */
        function renderDetailPage(shop) {
            // 检查收藏状态
            const favStatus = checkFavorite(shop.id);
            const isWantToGo = favStatus && favStatus.group === 'wantToGo';
            const isAlreadyEaten = favStatus && favStatus.group === 'alreadyEaten';

            // 构建多图展示 HTML
            // 第1张图作为主图（大图），其余作为侧边小图
            let galleryHTML = '';
            shop.images.forEach((imgClass, index) => {
                if (index === 0) {
                    // 主图：跨两行
                    galleryHTML += `
                        <div class="gallery-main">
                            <div class="gallery-item food-img-placeholder ${imgClass}">
                                <span>${shop.emoji}</span>
                            </div>
                        </div>`;
                } else {
                    // 侧边小图
                    galleryHTML += `
                        <div>
                            <div class="gallery-item food-img-placeholder ${imgClass}">
                                <span>${['📸', '🖼️', '🎨'][index - 1] || '📸'}</span>
                            </div>
                        </div>`;
                }
            });

            // 构建标签 HTML
            const tagsHTML = shop.tags.map(tag =>
                `<span class="tag">${tag}</span>`
            ).join('');

            // 构建招牌菜品 HTML
            const signatureHTML = shop.signature.map((dish, i) =>
                `<span class="signature-item">${['⭐', '🔥', '👍', '💯'][i] || '⭐'} ${dish}</span>`
            ).join('');

            // 构建避坑小贴士 HTML
            const tipsHTML = shop.tips.map(tip =>
                `<div class="tips-item">
                    <span class="tips-icon">💡</span>
                    <span>${tip}</span>
                </div>`
            ).join('');

            // 构建收藏按钮状态
            let favBtnHTML = '';
            if (isWantToGo) {
                favBtnHTML = '<button class="btn btn-outline" onclick="handleDetailFav(' + shop.id + ')">⭐ 已加入想去打卡（点击取消）</button>';
            } else if (isAlreadyEaten) {
                favBtnHTML = '<button class="btn btn-outline" onclick="handleDetailFav(' + shop.id + ')">✅ 已标记吃完打卡（点击取消）</button>';
            } else {
                favBtnHTML = `
                    <div class="fav-group-selector" id="favGroupSelector">
                        <div class="fav-group-option" onclick="handleDetailFavGroup(${shop.id}, 'wantToGo')">
                            <span class="group-icon">⭐</span>
                            <span>想去打卡</span>
                        </div>
                        <div class="fav-group-option" onclick="handleDetailFavGroup(${shop.id}, 'alreadyEaten')">
                            <span class="group-icon">✅</span>
                            <span>已经吃完打卡</span>
                        </div>
                    </div>`;
            }

            // 更新页面标题
            document.title = `${shop.name} - 深圳小众烟火美食打卡`;

            // 组合完整 HTML
            const container = document.getElementById('detailContent');
            container.innerHTML = `
                <!-- 多图展示 -->
                <div class="detail-gallery">
                    ${galleryHTML}
                </div>

                <!-- 店铺基本信息卡片 -->
                <div class="detail-info-card">
                    <div class="detail-header">
                        <div>
                            <h1 class="detail-name">
                                ${shop.emoji} ${shop.name}
                            </h1>
                        </div>
                        <span class="detail-price-badge">💰 人均 ¥${shop.price}</span>
                    </div>

                    <div class="detail-meta">
                        <span class="detail-meta-item">📍 <strong>${shop.area}</strong></span>
                        <span class="detail-meta-item">🕐 <strong>${shop.hours}</strong></span>
                    </div>

                    <div class="detail-tags">
                        ${tagsHTML}
                        <span class="tag tag-district">📍 ${shop.district}区</span>
                    </div>

                    <p class="detail-intro">${shop.intro}</p>

                    <!-- 收藏操作区 -->
                    ${favBtnHTML}
                </div>

                <!-- 精确地址 -->
                <div class="info-section">
                    <h2 class="info-section-title">📍 精确地址</h2>
                    <p style="color: var(--text-secondary); line-height: 1.6;">
                        ${shop.address}
                    </p>
                    <p style="margin-top: var(--spacing-sm); font-size: 0.85rem; color: var(--text-light);">
                        💡 建议使用地图APP导航前往
                    </p>
                </div>

                <!-- 招牌菜品 -->
                <div class="info-section">
                    <h2 class="info-section-title">🍽️ 招牌菜品</h2>
                    <div class="signature-list">
                        ${signatureHTML}
                    </div>
                </div>

                <!-- 探店避坑小贴士 -->
                <div class="info-section">
                    <h2 class="info-section-title">⚠️ 探店避坑小贴士</h2>
                    <div class="tips-list">
                        ${tipsHTML}
                    </div>
                </div>

                <!-- 底部操作按钮 -->
                <div class="detail-actions">
                    <a href="list.html" class="btn btn-outline">📋 查看更多美食</a>
                    <button class="btn btn-primary" onclick="openBlindBoxFromDetail()">🎲 随机再抽一家</button>
                </div>
            `;
        }

        /**
         * 详情页收藏操作（点击已收藏按钮取消收藏）
         * @param {number} shopId - 店铺ID
         */
        function handleDetailFav(shopId) {
            const favStatus = checkFavorite(shopId);
            if (favStatus) {
                toggleFavorite(shopId, favStatus.group);
                const shop = getShopById(shopId);
                showToast(`已取消收藏「${shop.name}」`);
                // 重新渲染详情页以更新按钮状态
                renderDetailPage(shop);
            }
        }

        /**
         * 详情页选择收藏分组
         * @param {number} shopId - 店铺ID
         * @param {string} group - 分组 'wantToGo' | 'alreadyEaten'
         */
        function handleDetailFavGroup(shopId, group) {
            const shop = getShopById(shopId);
            toggleFavorite(shopId, group);
            const groupName = group === 'wantToGo' ? '想去打卡' : '已经吃完打卡';
            showToast(`「${shop.name}」已加入${groupName} 🎉`);
            // 重新渲染详情页
            renderDetailPage(shop);
        }

        /**
         * 从详情页打开盲盒
         */
        function openBlindBoxFromDetail() {
            const shop = getRandomShop();
            showBlindBoxModal(shop);
        }

        /* ========== 页面初始化 ========== */
        function initDetailPage() {
            const shopId = getShopIdFromURL();

            if (!shopId) {
                // 没有传入ID，显示错误提示
                document.getElementById('detailContent').innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">😵</span>
                        <p>未找到店铺信息</p>
                        <a href="list.html" class="btn btn-primary" style="margin-top: 16px;">去美食列表看看</a>
                    </div>`;
                return;
            }

            const shop = getShopById(shopId);

            if (!shop) {
                // ID无效，店铺不存在
                document.getElementById('detailContent').innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">🔍</span>
                        <p>该店铺不存在或已被移除</p>
                        <a href="list.html" class="btn btn-primary" style="margin-top: 16px;">去美食列表看看</a>
                    </div>`;
                return;
            }

            // 渲染详情页
            renderDetailPage(shop);
        }

        // 启动详情页
        initDetailPage();
    </script>

</body>
</html>
